<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Viewer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="login-view" class="view active">
    <div class="login-box">
      <svg height="48" viewBox="0 0 16 16" width="48"><path fill="#24292f" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
      <h1>Sign in to GitHub Viewer</h1>
      <p>Enter your GitHub username to continue</p>
      <input type="text" id="username-input" placeholder="GitHub username">
      <button id="login-btn">Sign in</button>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <div id="app-view" class="view">
    <header class="app-header">
      <div class="header-left">
        <svg height="32" viewBox="0 0 16 16" width="32"><path fill="#24292f" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        <input type="text" id="header-search" placeholder="Search or jump to...">
      </div>
      <button id="logout-btn">Logout</button>
    </header>

    <main class="container">
      <aside class="profile-sidebar">
        <img id="profile-avatar" src="" alt="avatar">
        <h1 id="profile-name"></h1>
        <div id="profile-username" class="text-muted"></div>
        <p id="profile-bio"></p>
        <div class="profile-stats">
          <span><strong id="followers-count">0</strong> followers</span> · 
          <span><strong id="following-count">0</strong> following</span>
        </div>
        <ul id="profile-details"></ul>
      </aside>

      <section class="main-content">
        <nav class="tab-nav">
          <button class="tab-btn active" data-tab="overview">Overview</button>
          <button class="tab-btn" data-tab="repositories">Repositories <span id="repo-count" class="counter">0</span></button>
        </nav>

        <div id="overview-tab" class="tab-content active">
          <div id="profile-readme"></div>
          <h2>Pinned</h2>
          <div id="pinned-repos" class="repo-grid"></div>
          <h2 id="contrib-year"></h2>
          <div id="contrib-graph"></div>
        </div>

        <div id="repositories-tab" class="tab-content">
          <div class="repo-controls">
            <input type="text" id="repo-search" placeholder="Find a repository...">
            <select id="repo-sort">
              <option value="updated">Last updated</option>
              <option value="name">Name</option>
              <option value="stars">Stars</option>
            </select>
          </div>
          <div id="repo-list"></div>
        </div>

        <div id="repo-view" class="tab-content">
          <div class="repo-header">
            <button id="back-to-profile">← Back</button>
            <h2 id="repo-view-name"></h2>
          </div>
          <div id="file-browser"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
